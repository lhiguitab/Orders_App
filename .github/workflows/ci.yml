name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
        -name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
        -name: Install deps
        run: pip install -r requirements.txt
  
      # 5. Pruebas unitarias
        -name: Run tests
        run: python -m pytest test_integration_with_fake.py -v